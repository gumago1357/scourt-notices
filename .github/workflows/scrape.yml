name: 대법원 자산매각 공고 스크래핑

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4

      - name: 스크래핑 실행
        run: |
          python scraper/scrape.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notices.json docs/files/
          git diff --staged --quiet || git commit -m "데이터 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
