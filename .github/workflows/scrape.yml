name: 대법원 공고 스크래핑

on:
  schedule:
    - cron: '0 11 */3 * *'   # 3일마다 저녁 8시 KST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240     # 4시간으로 늘림

    permissions:
      contents: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 중복 확장자 파일명 정리 (.pdf.pdf → .pdf 등)
        run: |
          cd docs/files
          for f in *.pdf.pdf; do
            [ -f "$f" ] && mv "$f" "${f%.pdf.pdf}.pdf" && echo "수정: $f → ${f%.pdf.pdf}.pdf"
          done
          for f in *.hwp.hwp; do
            [ -f "$f" ] && mv "$f" "${f%.hwp.hwp}.hwp" && echo "수정: $f → ${f%.hwp.hwp}.hwp"
          done
          for f in *.docx.docx; do
            [ -f "$f" ] && mv "$f" "${f%.docx.docx}.docx" && echo "수정: $f → ${f%.docx.docx}.docx"
          done
          for f in *.xlsx.xlsx; do
            [ -f "$f" ] && mv "$f" "${f%.xlsx.xlsx}.xlsx" && echo "수정: $f → ${f%.xlsx.xlsx}.xlsx"
          done
          echo "파일명 정리 완료"

      - name: 스크래핑 실행
        run: python scraper/scrape.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: 변경사항 확인
        id: check_changes
        run: |
          git add data/notices.json data/monthly_stats.json docs/files/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 커밋 및 푸시
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NOTICE_COUNT=$(python -c "
          import json
          try:
              d = json.load(open('data/notices.json'))
              print(d.get('count', '?'))
          except:
              print('?')
          ")
          DATE_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
          git commit -m "공고 업데이트: ${NOTICE_COUNT}건 (${DATE_KST})"
          git push
